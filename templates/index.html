<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Heart Disease Prediction</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right,#4facfe,#00f2fe);
            text-align:center;
            padding:40px;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            width:500px;
            margin:auto;
            box-shadow:0px 5px 20px rgba(0,0,0,0.2);
        }

        h1{
            color:#333;
        }

        input{
            width:90%;
            padding:10px;
            margin:8px;
            border-radius:5px;
            border:1px solid #ccc;
        }

        button{
            background:#007BFF;
            color:white;
            padding:12px 25px;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .result{
            margin-top:20px;
            font-size:20px;
            color:#e63946;
        }

    </style>

</head>

<body>

<div class="container">

<h1>Heart Disease Prediction</h1>

<form action="/predict" method="post">

<input type="text" name="age" placeholder="Age" required>

<input type="text" name="sex" placeholder="Sex (0 = Female, 1 = Male)" required>

<input type="text" name="cp" placeholder="Chest Pain Type" required>

<input type="text" name="trestbps" placeholder="Resting Blood Pressure" required>

<input type="text" name="chol" placeholder="Cholesterol" required>

<input type="text" name="fbs" placeholder="Fasting Blood Sugar" required>

<input type="text" name="restecg" placeholder="Rest ECG" required>

<input type="text" name="thalach" placeholder="Maximum Heart Rate" required>

<input type="text" name="exang" placeholder="Exercise Induced Angina" required>

<input type="text" name="oldpeak" placeholder="Oldpeak" required>

<input type="text" name="slope" placeholder="Slope" required>

<input type="text" name="ca" placeholder="CA" required>

<input type="text" name="thal" placeholder="Thal" required>

<br><br>

<button type="submit">Predict</button>

</form>

<div class="result">
{{ prediction_text }}
</div>

</div>

</body>
</html>
